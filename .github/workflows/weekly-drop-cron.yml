name: Weekly Drop Cron

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force run (ignore interval)"
        required: false
        default: "false"
  schedule:
    # Runs at minute 31 every 12 hours (00:31 and 12:31 UTC)
    - cron: "31 */12 * * *"

jobs:
  run-weekly-drop:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Supabase weekly drop cron mode
        env:
          SUPABASE_FUNCTION_URL: ${{ secrets.SUPABASE_FUNCTION_URL }}
          WEEKLY_DROP_CRON_SECRET: ${{ secrets.WEEKLY_DROP_CRON_SECRET }}
          FORCE_RUN: ${{ github.event.inputs.force || 'false' }}
        run: |
          if [ -z "$SUPABASE_FUNCTION_URL" ]; then
            echo "Missing SUPABASE_FUNCTION_URL secret."
            exit 1
          fi
          if [ -z "$WEEKLY_DROP_CRON_SECRET" ]; then
            echo "Missing WEEKLY_DROP_CRON_SECRET secret."
            exit 1
          fi

          payload='{"mode":"weekly_drop_tick_cron"}'
          if [ "$FORCE_RUN" = "true" ]; then
            payload='{"mode":"weekly_drop_tick_cron","force":true}'
          fi

          echo "Calling weekly drop cron endpoint..."
          response=$(curl -sS -w "\n%{http_code}" -X POST "$SUPABASE_FUNCTION_URL" \
            -H "Content-Type: application/json" \
            -H "x-weekly-drop-secret: $WEEKLY_DROP_CRON_SECRET" \
            -d "$payload")

          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n 1)

          echo "HTTP $status"
          echo "$body"

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Weekly drop cron request failed."
            exit 1
          fi
