# ---------------------------------------------------------------------------
# Auth (hosted production — keep aligned with Dashboard; do not use local dev URLs here)
# ---------------------------------------------------------------------------
[auth]
enabled = true
site_url = "https://lustforge.app"
additional_redirect_urls = [
  "https://lustforge.app/**",
  "https://lustforge.app/auth/callback",
  "https://lustforge.app/auth",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
enable_signup = true
minimum_password_length = 8

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

# Transactional mail (confirm, reset) is sent by Supabase Auth. For production deliverability, set Custom SMTP in the
# Dashboard (this block mainly applies to local CLI / self-host; hosted projects mirror settings in Dashboard).
[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

# LustForge-themed Auth emails. Paths are relative to the repo root (where the CLI is run).
# Apply to hosted project with: supabase config push
# Or copy HTML from supabase/templates/ into Dashboard → Authentication → Email Templates.
[auth.email.template.confirmation]
subject = "Confirm your LustForge email"
content_path = "./supabase/templates/auth_confirmation.html"

[auth.email.template.recovery]
subject = "Forged access — reset your LustForge password"
content_path = "./supabase/templates/auth_recovery.html"

[auth.email.template.magic_link]
subject = "Velvet rope — your LustForge magic link"
content_path = "./supabase/templates/auth_magic_link.html"

[auth.email.template.email_change]
subject = "Bless this address — confirm your new LustForge inbox"
content_path = "./supabase/templates/auth_email_change.html"

[auth.email.template.invite]
subject = "Private invite — you’re summoned to LustForge"
content_path = "./supabase/templates/auth_invite.html"