# Let the browser call `generate-image` without Kong rejecting some user JWTs.
# Auth is enforced inside the function (session user must match body.userId).
# For hosted projects: also disable JWT verification for this function in Dashboard → Edge Functions → generate-image.
[functions.generate-image]
verify_jwt = false

# Newer Supabase projects may issue ES256 session JWTs; Kong verification can fail with "Unsupported JWT algorithm".
# These functions validate the Authorization bearer inside Deno instead (see _shared/requireSessionUser.ts).
[functions.admin-companion-chat]
verify_jwt = false

[functions.admin-x-marketing]
verify_jwt = false

[functions.parse-companion-prompt]
verify_jwt = false

[functions.generate-forge-companion-name]
verify_jwt = false

